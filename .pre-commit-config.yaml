repos:
  # ---------- Python ----------
  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.2
    hooks:
      - id: ruff
      - id: ruff-format

  # ---------- Rust ----------
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: bash -lc "cd rust/cloudtwin-lite && cargo fmt --all"
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: bash -lc "cd rust/cloudtwin-lite && cargo clippy --all-targets --all-features -- -D warnings"
        language: system
        types: [rust]
        pass_filenames: false