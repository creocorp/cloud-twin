name: Publish CloudTwin Lite

on:
  push:
    tags:
      - "lite-*.*.*"    # triggers on: lite-v1.0.0, lite-v0.2.1, etc.
  workflow_dispatch:     # manual trigger from the Actions tab

env:
  CARGO_TERM_COLOR: always

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Build and push Docker image
  # ────────────────────────────────────────────────────────────────────────────
  docker:
    name: Docker image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: creogroup
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: creogroup/cloudtwin
          # Keep "lite-" prefix: tags become lite-0.2.2 / lite-0.2 / lite-latest
          tags: |
            type=match,pattern=(lite-.*),group=1
            type=match,pattern=(lite-\d+\.\d+),group=1
            type=raw,value=lite-latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.lite
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true
