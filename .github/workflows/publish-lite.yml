name: Publish CloudTwin Lite

on:
  push:
    tags:
      - "lite-*.*.*"    # triggers on: lite-v1.0.0, lite-v0.2.1, etc.
  workflow_dispatch:     # manual trigger from the Actions tab

env:
  CARGO_TERM_COLOR: always

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Build native release binaries for each target platform
  # ────────────────────────────────────────────────────────────────────────────
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: cloudtwin-lite-linux-amd64.tar.gz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            archive: cloudtwin-lite-linux-arm64.tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: cloudtwin-lite-macos-amd64.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: cloudtwin-lite-macos-arm64.tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: cloudtwin-lite-windows-amd64.zip

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux cross-compile)
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q musl-tools
          # aarch64 musl cross-compiler
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-musl" ]]; then
            sudo apt-get install -y -q gcc-aarch64-linux-gnu
            echo 'CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc' >> $GITHUB_ENV
          fi

      - name: Cache Cargo registry / build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/cloudtwin-lite/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('rust/cloudtwin-lite/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release binary
        working-directory: rust/cloudtwin-lite
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          BIN=rust/cloudtwin-lite/target/${{ matrix.target }}/release/cloudtwin-lite
          tar -czf ${{ matrix.archive }} -C $(dirname $BIN) $(basename $BIN)

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "rust/cloudtwin-lite/target/${{ matrix.target }}/release/cloudtwin-lite.exe"
          Compress-Archive -Path $bin -DestinationPath ${{ matrix.archive }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  # ────────────────────────────────────────────────────────────────────────────
  # Create GitHub release and attach all binaries
  # ────────────────────────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: build-binaries
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: CloudTwin Lite ${{ github.ref_name }}
          body: |
            ## CloudTwin Lite ${{ github.ref_name }}

            Single-binary, no-runtime-dependency build of CloudTwin.

            ### Supported services
            AWS: S3, SES (v1 + v2), SNS, SQS, DynamoDB, Secrets Manager
            Azure: Blob Storage, Service Bus
            GCP: Cloud Storage, Pub/Sub

            ### Quick start
            ```bash
            # Linux amd64
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/cloudtwin-lite-linux-amd64.tar.gz | tar xz
            CLOUDTWIN_DB_PATH=:memory: ./cloudtwin-lite
            ```
          files: dist/*
          fail_on_unmatched_files: true

  # ────────────────────────────────────────────────────────────────────────────
  # Build and push Docker image
  # ────────────────────────────────────────────────────────────────────────────
  docker:
    name: Docker image
    needs: build-binaries
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: creogroup
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: creogroup/cloudtwin-lite
          # Strip "lite-" prefix so tags become v1.0.0 / 1.0 / latest
          tags: |
            type=match,pattern=lite-(v.*),group=1
            type=match,pattern=lite-(v\d+\.\d+),group=1
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.lite
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true
